<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Logo Mes Prières</title>
  <desc id="desc">Une croix au-dessus d'un livre ouvert, avec le texte Mes Prières.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fffaf3"/>
      <stop offset="100%" stop-color="#f2e9d8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#4d2f1b" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1024" height="1024" rx="180" fill="url(#bg)"/>

  <g stroke="#c8a96a" stroke-width="10" stroke-linecap="round">
    <line x1="512" y1="120" x2="512" y2="175"/>
    <line x1="430" y1="145" x2="462" y2="185"/>
    <line x1="594" y1="145" x2="562" y2="185"/>
    <line x1="382" y1="212" x2="436" y2="225"/>
    <line x1="642" y1="212" x2="588" y2="225"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="462" y="230" width="100" height="310" rx="18" fill="#6f4e37"/>
    <rect x="378" y="314" width="268" height="96" rx="18" fill="#6f4e37"/>
    <path d="M462 540 L512 604 L562 540 Z" fill="#5a3a28"/>
  </g>

  <g filter="url(#shadow)">
    <path d="M512 548 C430 500 332 496 226 530 L278 716 C370 688 447 694 512 744 Z"
          fill="#fffdf8" stroke="#6f4e37" stroke-width="18" stroke-linejoin="round"/>
    <path d="M512 548 C594 500 692 496 798 530 L746 716 C654 688 577 694 512 744 Z"
          fill="#fffdf8" stroke="#6f4e37" stroke-width="18" stroke-linejoin="round"/>
    <path d="M512 548 C430 520 350 520 258 548"
          fill="none" stroke="#c8a96a" stroke-width="10" stroke-linecap="round"/>
    <path d="M512 548 C594 520 674 520 766 548"
          fill="none" stroke="#c8a96a" stroke-width="10" stroke-linecap="round"/>
    <line x1="512" y1="548" x2="512" y2="744" stroke="#6f4e37" stroke-width="14"/>
  </g>

  <text x="512" y="870" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="92" font-weight="700" fill="#6f4e37">
    Mes Prières
  </text>
</svg>
