<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Application de prières catholiques simple, installable et utilisable hors ligne.">
  <meta name="theme-color" content="#6f4e37">

  <title>Mes Prières</title>

  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="assets/icons/icon-192.png">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <header class="site-header">
    <div class="container site-header__content">
      <a class="brand" href="index.html" aria-label="Accueil de Mes Prières">
        <span class="brand__symbol" aria-hidden="true">✝</span>
        <span class="brand__name">Mes Prières</span>
      </a>

      <button
        class="menu-button"
        type="button"
        aria-label="Ouvrir le menu"
        aria-controls="main-navigation"
        aria-expanded="false"
      >
        <span aria-hidden="true">☰</span>
      </button>

      <nav id="main-navigation" class="main-navigation" aria-label="Navigation principale">
        <a href="#prieres">Prières</a>
        <a href="#apropos">À propos</a>
      </nav>
    </div>
  </header>

  <main>
    <main>

    <section class="hero">

        <div class="container">

            <h2>

                Un temps de prière, simplement.

            </h2>

            <p>

                Retrouvez vos prières favorites,
                même sans connexion Internet.

            </p>

        </div>

    </section>

    <section id="prieres">

        <div class="container">

            <div id="prayer-list">

                Chargement...

            </div>

        </div>

    </section>

</main>

<dialog id="prayer-dialog">

    <button id="close-dialog">

        ✕

    </button>

    <img
        id="dialog-image"
        src=""
        alt="">

    <h2 id="dialog-title"></h2>

    <p id="dialog-category"></p>

    <article id="dialog-content"></article>

</dialog>
  </main>

  <footer class="site-footer">
    <div class="container site-footer__content">
      <p>© <span id="current-year">2026</span> Jean-Baptiste Baillet</p>
      <p>Application distribuée sous licence MIT.</p>
    </div>
  </footer>

  <dialog id="prayer-dialog" class="prayer-dialog">
    <article class="prayer-dialog__content">
      <button
        id="close-prayer-dialog"
        class="prayer-dialog__close"
        type="button"
        aria-label="Fermer la prière"
      >
        ×
      </button>

      <p id="prayer-dialog-category" class="prayer-dialog__category"></p>
      <h2 id="prayer-dialog-title"></h2>
      <div id="prayer-dialog-text" class="prayer-dialog__text"></div>
    </article>
  </dialog>

  <script src="js/app.js" defer></script>
</body>
</html>
